services:
  - type: web
    name: raw-materials
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raw-materials-db
          property: connectionString

databases:
  - name: raw-materials-db
    databaseName: raw_materials
    user: raw_materials_user
